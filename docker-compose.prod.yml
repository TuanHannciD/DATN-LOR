version: "3.9"

services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: datnlor-sqlserver
    restart: unless-stopped
    env_file:
      - .env.prod
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: ${MSSQL_SA_PASSWORD}
    ports:
      - "1433:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/localhost/1433'"]
      interval: 15s
      timeout: 5s
      retries: 20

  app:
    image: ghcr.io/tuanhanncid/datn-lor:${IMAGE_TAG:-latest}
    container_name: datnlor-app
    restart: unless-stopped
    depends_on:
      sqlserver:
        condition: service_healthy
    env_file:
      - .env.prod
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
    ports:
      - "8081:8080"

volumes:
  sqlserver_data: