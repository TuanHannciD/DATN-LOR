name: CI-CD

on:
  push:
    branches: ["main"]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/datn-lor

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore
        run: dotnet restore AuthDemo.sln

      - name: Build
        run: dotnet build AuthDemo.sln -c Release --no-restore

  docker:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
      packages: write

    outputs:
      image_tag: ${{ steps.vars.outputs.short_sha }}

    steps:
    - name: Checkout
      uses: actions/checkout@v5

    - name: Set lowercase image name
      id: vars
      run: |
        echo "short_sha=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT
        echo "image_name=$(echo '${{ env.IMAGE_NAME }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
      with:
        driver: docker-container

    - name: Login to GHCR
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Extract Docker metadata
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ${{ steps.vars.outputs.image_name }}
        tags: |
          type=raw,value=latest
          type=raw,value=${{ steps.vars.outputs.short_sha }}

    - name: Build and push image
      uses: docker/build-push-action@v6
      with:
        context: .
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

  deploy:
    runs-on: ubuntu-latest
    needs: docker
    environment:
        name: production

    steps:
        - name: Deploy to server via SSH
          uses: appleboy/ssh-action@v1.2.0
          with:
            host: ${{ secrets.SERVER_HOST }}
            username: ${{ secrets.SERVER_USER }}
            key: ${{ secrets.SERVER_SSH_KEY }}
            port: ${{ secrets.SERVER_PORT }}
            script: |
                set -e

                sudo mkdir -p /opt/datn-lor
                sudo chown -R deploy:deploy /opt/datn-lor

                if [ ! -d /opt/datn-lor/.git ]; then
                    git clone https://github.com/TuanHannciD/DATN-LOR.git /opt/datn-lor
                fi

                cd /opt/datn-lor
                git fetch origin main
                git reset --hard origin/main

                echo "${{ secrets.GHCR_TOKEN }}" | sudo docker login ghcr.io -u "${{ secrets.GHCR_USERNAME }}" --password-stdin

                export IMAGE_TAG=${{ needs.docker.outputs.image_tag }}

                 sudo docker compose --env-file .env.prod -f docker-compose.prod.yml config
                sudo docker compose --env-file .env.prod -f docker-compose.prod.yml pull app
                sudo docker compose --env-file .env.prod -f docker-compose.prod.yml up -d

                sudo docker image prune -af || true        
                